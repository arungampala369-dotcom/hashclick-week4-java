<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Login — Task Manager</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-header"><h1>Task Manager</h1><p>Hashclick Solutions</p></div>
    <h2>Login</h2>
    <div id="err" class="error-msg" style="display:none"></div>
    <form id="loginForm">
      <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="Enter email" required/></div>
      <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="Enter password" required/></div>
      <button type="submit" class="btn-primary">Login</button>
    </form>
    <p class="auth-link">No account? <a href="register.html">Register</a></p>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
