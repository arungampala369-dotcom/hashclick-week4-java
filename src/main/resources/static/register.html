<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Register — Task Manager</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-header"><h1>Task Manager</h1><p>Hashclick Solutions</p></div>
    <h2>Register</h2>
    <div id="err" class="error-msg" style="display:none"></div>
    <form id="registerForm">
      <div class="form-group"><label>Full Name</label><input type="text" id="name" placeholder="Your name" required/></div>
      <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="Your email" required/></div>
      <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="Create password" required/></div>
      <button type="submit" class="btn-primary">Register</button>
    </form>
    <p class="auth-link">Have account? <a href="login.html">Login</a></p>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
